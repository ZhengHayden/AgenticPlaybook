name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: app
        env:
          GITHUB_PAGES: "true"
        run: npx next build

      - name: Stage Pages site
        run: |
          mkdir -p _site
          cp index.html _site/
          if [ -d Playbook_for_PS ]; then
            cp -R Playbook_for_PS _site/
            if [ -f _site/Playbook_for_PS/agentic-playbook-interactive.html ] && [ ! -f _site/Playbook_for_PS/index.html ]; then
              cp _site/Playbook_for_PS/agentic-playbook-interactive.html _site/Playbook_for_PS/index.html
            fi
          fi
          mkdir -p _site/app
          cp -R app/out/. _site/app/
          touch _site/.nojekyll

      - name: Inline auth.js into HTMLs and drop plaintext JS
        # Reason: staticrypt only encrypts HTML files. Leaving auth.js plaintext
        # would leak demo passwords + role hierarchy. Inlining means the auth
        # code lives inside the encrypted HTML body and is never served as JS.
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const authPath = "_site/Playbook_for_PS/js/auth.js";
          if (!fs.existsSync(authPath)) {
            console.log("auth.js not present, skipping inline step");
            process.exit(0);
          }
          const authJs = fs.readFileSync(authPath, "utf8");
          const inline = `<script>\n${authJs}\n</script>`;
          const pattern = /<script\s+src="\.\/(?:[^"]*\/)?js\/auth\.js"><\/script>/g;
          let touched = 0;
          (function walk(dir) {
            for (const e of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) walk(p);
              else if (e.name.endsWith(".html")) {
                const before = fs.readFileSync(p, "utf8");
                const after = before.replace(pattern, inline);
                if (after !== before) {
                  fs.writeFileSync(p, after);
                  touched++;
                  console.log("inlined auth.js → " + p);
                }
              }
            }
          })("_site");
          fs.rmSync(authPath);
          try { fs.rmdirSync(path.dirname(authPath)); } catch {}
          console.log(`Inlined auth.js into ${touched} HTML file(s); plaintext JS removed.`);
          NODE

      - name: Validate staticrypt secret
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::error::STATICRYPT_PASSWORD secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Encrypt site with staticrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          # Reuse the committed salt so re-encrypts don't invalidate localStorage
          cp .staticrypt.json _site/.staticrypt.json
          cd _site
          npx -y staticrypt . \
            --recursive \
            --remember 0 \
            --short \
            -d encrypted
          # staticrypt nests output under encrypted/<basename-of-cwd>/ → encrypted/_site/...
          # Copy encrypted HTML back over the originals (preserves JS/CSS/JSON as plaintext)
          find encrypted/_site -type f -name "*.html" -print0 | while IFS= read -r -d '' f; do
            rel="${f#encrypted/_site/}"
            mkdir -p "$(dirname "$rel")"
            cp "$f" "$rel"
          done
          rm -rf encrypted .staticrypt.json
          touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
