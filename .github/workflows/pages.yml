name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: app
        env:
          GITHUB_PAGES: "true"
        run: npx next build

      - name: Stage Pages site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp agentic-workflow-executive-playbook.html _site/
          cp agentic-workflow-operating-blueprint.html _site/
          cp agentic-workflow-practitioner-field-guide.html _site/
          mkdir -p _site/app
          cp -R app/out/. _site/app/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
